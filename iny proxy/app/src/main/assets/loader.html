    function getPageFromUrl() {
        var url = window.location.href;
        if (url.indexOf('?page=login') !== -1) return 'login';
        if (url.indexOf('?page=game_list') !== -1) return 'game_list';
        if (url.indexOf('?page=index') !== -1) return 'index';
        return 'login'; // DEFAULT: LOGIN
    }

    var currentPage = getPageFromUrl();

    var pageContent = '';
    if (currentPage === 'login') {
        pageContent = decryptContent(encryptedLogin);
    } else if (currentPage === 'game_list') {
        pageContent = decryptContent(encryptedGameList);
    } else {
        pageContent = decryptContent(encryptedIndex);
    }

    document.getElementById('app').innerHTML = pageContent;
