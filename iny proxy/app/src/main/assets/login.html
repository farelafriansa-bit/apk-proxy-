<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - INY PROXY</title>
    <link rel="stylesheet" href="style.css">
<style>
        .login-container {
            background: #fff;
            border: 4px solid #1a7a4a;
            border-radius: 15px;
            padding: 25px 20px;
            margin: 0 auto;
            box-shadow: 8px 8px 0px #0d5c34;
            max-width: 380px;
            animation: slideUp 0.6s ease;
        }

        .login-container h2 {
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            color: #1a7a4a;
            margin-bottom: 20px;
            font-family: 'Comic Sans MS', sans-serif;
        }

        .login-container input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 3px solid #1a7a4a;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Comic Sans MS', sans-serif;
            font-weight: bold;
            box-shadow: 3px 3px 0px #0d5c34;
            transition: all 0.2s;
        }

        .login-container input:focus {
            outline: none;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px #0d5c34;
        }

        .login-container .btn-login {
            width: 100%;
            padding: 14px;
            border: 3px solid #000;
            border-radius: 30px;
            background: #1a7a4a;
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            font-family: 'Comic Sans MS', sans-serif;
            cursor: pointer;
            box-shadow: 5px 5px 0px #0d5c34;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .login-container .btn-login:hover {
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px #0d5c34;
            background: #2ecc71;
        }

        .login-container .btn-login:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #0d5c34;
        }

        .login-container .login-footer {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #999;
            font-family: 'Comic Sans MS', sans-serif;
        }
</style>
  </head>
  <body>

    <div class="header">
	  <div class="video-container">
		<video autoplay loop muted playsinline>
		  <source src="file:///android_asset/anime.mp4" type="video/mp4">
		</video>
	  </div>
	  <div class="comic-bubble">POW!</div>
    </div>

    <div class="app-banner-wrapper">
	  <div class="app-banner">
		<span class="app-icon">🔐</span>
		<span class="app-name">INY PROXY</span>
		<span class="app-sub">✦ Login ✦</span>
	  </div>
    </div>

    <div class="login-container">
	  <h2>🔑 Login</h2>
	  <input type="text" id="username" placeholder="Username">
	  <input type="password" id="password" placeholder="Password">
	  <button class="btn-login" onclick="login()">Login</button>
	  <p class="login-footer">Default: admin / admin123</p>
    </div>

    <div class="developer-footer">
	  <span>✦</span> Developed by <span>✦</span><br>
	  © 2026 All Rights Reserved
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
<script>
        function login() {
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();

            if (username === 'admin' && password === 'admin123') {
                showToast('✅ Login berhasil!');
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 500);
            } else {
                showToast('❌ Username atau password salah!');
            }
        }
</script>
  </body>
</html>
